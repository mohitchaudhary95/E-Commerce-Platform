services:
 
  # ───────────────── Infrastructure ─────────────────
 
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    # ── ADDED: healthcheck so depends_on waits for SQL to be truly ready ──
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "YourStrong@Passw0rd",
          "-Q", "SELECT 1",
          "-No"   # trust server cert (required in mssql-tools18)
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s   # give SQL Server time to start before first check
 
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
 
  # ───────────────── Gateway ─────────────────
 
  gateway:
    build:
      context: .
      dockerfile: ECommerce.Gateway/Dockerfile
    container_name: ecommerce-gateway
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    # ── FIXED: gateway waits for ALL services, not just identity + product ──
    depends_on:
      - identity-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service
    restart: on-failure
 
  # ───────────────── Identity Service ─────────────────
 
  identity-service:
    build:
      context: .
      dockerfile: ECommerce.Identity.API/Dockerfile
    container_name: ecommerce-identity
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__IdentityDb: Server=sqlserver,1433;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    # ── FIXED: condition: service_healthy waits for SQL to accept connections ──
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure
 
  # ───────────────── Product Service ─────────────────
 
  product-service:
    build:
      context: .
      dockerfile: ECommerce.Product.API/Dockerfile
    container_name: ecommerce-product
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__ProductDb: Server=sqlserver,1433;Database=ProductDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure
 
  # ───────────────── Cart Service ─────────────────
 
  cart-service:
    build:
      context: .
      dockerfile: ECommerce.Cart.API/Dockerfile
    container_name: ecommerce-cart
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5003
      ConnectionStrings__CartDb: Server=sqlserver,1433;Database=CartDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      ServiceUrls__ProductService: http://product-service:5002/
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy
      product-service:
        condition: service_started
    restart: on-failure
 
  # ───────────────── Order Service ─────────────────
 
  order-service:
    build:
      context: .
      dockerfile: ECommerce.Order.API/Dockerfile
    container_name: ecommerce-order
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__OrderDb: Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      RabbitMQ__Host: rabbitmq
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
 
  # ───────────────── Payment Service ─────────────────
 
  payment-service:
    build:
      context: .
      dockerfile: ECommerce.Payment.API/Dockerfile
    container_name: ecommerce-payment
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__PaymentDb: Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      RabbitMQ__Host: rabbitmq
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
 
  # ───────────────── Inventory Service ─────────────────
 
  inventory-service:
    build:
      context: .
      dockerfile: ECommerce.Inventory.API/Dockerfile
    container_name: ecommerce-inventory
    ports:
      - "5006:5006"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5006
      ConnectionStrings__InventoryDb: Server=sqlserver,1433;Database=InventoryDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False
      RabbitMQ__Host: rabbitmq
      JwtSettings__SecretKey: YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      JwtSettings__Issuer: ECommerce.Identity
      JwtSettings__Audience: ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
 
  # ───────────────── Notification Service ─────────────────
 
  notification-service:
    build:
      context: .
      dockerfile: ECommerce.Notification.API/Dockerfile
    container_name: ecommerce-notification
    ports:
      - "5007:5007"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5007
      RabbitMQ__Host: rabbitmq
    # Notification only needs RabbitMQ — no database
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
 
volumes:
  sqlserver_data:
  rabbitmq_data: