version: '3.8'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Services ──────────────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: ECommerce.Gateway/Dockerfile
    container_name: ecommerce-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
    depends_on:
      - identity-service
      - product-service

  identity-service:
    build:
      context: .
      dockerfile: ECommerce.Identity.API/Dockerfile
    container_name: ecommerce-identity
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__IdentityDb=Server=sqlserver,1433;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: ECommerce.Product.API/Dockerfile
    container_name: ecommerce-product
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__ProductDb=Server=sqlserver,1433;Database=ProductDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
    depends_on:
      sqlserver:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: ECommerce.Cart.API/Dockerfile
    container_name: ecommerce-cart
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__CartDb=Server=sqlserver,1433;Database=CartDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
      - ServiceUrls__ProductService=http://product-service:5002/
    depends_on:
      sqlserver:
        condition: service_healthy
      product-service:
        condition: service_started

  order-service:
    build:
      context: .
      dockerfile: ECommerce.Order.API/Dockerfile
    container_name: ecommerce-order
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - ConnectionStrings__OrderDb=Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
      - RabbitMQ__Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ECommerce.Payment.API/Dockerfile
    container_name: ecommerce-payment
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5005
      - ConnectionStrings__PaymentDb=Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
      - RabbitMQ__Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: ECommerce.Inventory.API/Dockerfile
    container_name: ecommerce-inventory
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5006
      - ConnectionStrings__InventoryDb=Server=sqlserver,1433;Database=InventoryDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - JwtSettings__SecretKey=YourSuperSecretKeyThatIsAtLeast32CharactersLong!!
      - JwtSettings__Issuer=ECommerce.Identity
      - JwtSettings__Audience=ECommerce.Client
      - RabbitMQ__Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: ECommerce.Notification.API/Dockerfile
    container_name: ecommerce-notification
    ports:
      - "5007:5007"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5007
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  sqlserver_data:
  rabbitmq_data:
